<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOXIA | Gaming Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">JOXIA</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Rechercher un jeu..." onkeyup="searchGame()">
        </div>
        <div class="nav-right">
            <button class="rank-btn" id="rankBtn">🏆 CLASSEMENT</button>
            <div style="position: relative;">
                <button class="login-btn">SE CONNECTER</button>
                <div id="userMenu" class="user-dropdown" style="display: none;">
                    <button id="logoutBtn" class="menu-item">Se déconnecter</button>
                    <button id="deleteAccountBtn" class="menu-item delete-item">Supprimer le compte</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <h2 class="section-title">Catalogue des Jeux</h2>
        <div class="game-grid">
            <a href="https://joxiagame.github.io/Snake-Joxia/" class="game-card" id="snakeLink">
                <div class="game-thumb">
                    <img src="https://via.placeholder.com/400x220/1a1a2e/39ff14?text=SNAKE+MASTER+PRO" alt="Snake" class="game-img">
                    <div class="play-overlay">JOUER</div>
                </div>
                <div class="game-info">
                    <h3>Snake Joxia</h3>
                    <p>Arcade • Classique</p>
                </div>
            </a>
            <div class="game-card">
                <div class="game-thumb"><span style="font-size: 3rem; color: #252535;">+</span></div>
                <div class="game-info"><h3>Prochainement</h3><p>En développement</p></div>
            </div>
        </div>
    </main>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3 id="authTitle">Connexion</h3>
            <input type="text" id="usernameInput" placeholder="Pseudo">
            <input type="password" id="passwordInput" placeholder="Mot de passe">
            <button id="confirmBtn" class="login-btn" style="width: 100%; margin-top: 10px;">VALIDER</button>
            <p class="auth-switch">
                <span id="switchText">Pas de compte ?</span> 
                <a href="#" id="toggleAuthMode">S'inscrire</a>
            </p>
        </div>
    </div>

    <div id="leaderboardModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <span class="close-btn" id="closeRank">&times;</span>
            <h3 style="color: var(--neon); margin-bottom: 20px;">🏆 TOP JOXIA</h3>
            <div id="leaderboardContent" style="max-height: 400px; overflow-y: auto; color: white;">
                <p>Chargement des scores...</p>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
